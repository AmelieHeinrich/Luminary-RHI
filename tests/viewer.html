<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Luminary RHI — Test Results</title>
<style>
  /* ── Reset & base ─────────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f0f11;
    --surface:   #18181c;
    --surface2:  #222228;
    --border:    #2e2e38;
    --text:      #e8e8f0;
    --text-dim:  #888899;
    --pass:      #22c55e;
    --fail:      #ef4444;
    --pass-bg:   rgba(34,197,94,.10);
    --fail-bg:   rgba(239,68,68,.10);
    --accent:    #818cf8;
    --tab-active:#ffffff;
    --radius:    10px;
    --font:      'Inter', 'Segoe UI', system-ui, sans-serif;
    --mono:      'JetBrains Mono', 'Fira Mono', monospace;
    --grid-min:  240px;
  }

  :root.light {
    --bg:        #f9fafb;
    --surface:   #ffffff;
    --surface2:  #f3f4f6;
    --border:    #e5e7eb;
    --text:      #111827;
    --text-dim:  #6b7280;
    --tab-active:#000000;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.5; }

  /* ── Top bar ──────────────────────────────────────────────────────────── */
  header {
    display: flex; align-items: center; gap: 20px;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-size: 15px; font-weight: 600; letter-spacing: .02em; color: var(--text); white-space: nowrap; flex-shrink: 0; }
  header .meta { font-size: 12px; color: var(--text-dim); display: flex; gap: 16px; flex: 1; }
  header .meta span { display: flex; align-items: center; gap: 5px; }

  header .controls { display: flex; align-items: center; gap: 12px; margin-left: auto; }

  .search-bar {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    padding: 6px 12px; border-radius: 6px; font-size: 12px; outline: none; transition: border-color .2s;
    width: 200px; font-family: inherit;
  }
  .search-bar:focus { border-color: var(--accent); }

  .icon-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    width: 28px; height: 28px; border-radius: 6px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 14px;
    transition: background .2s, border-color .2s; outline: none;
  }
  .icon-btn:hover { background: var(--surface); border-color: var(--text-dim); }

  header .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
  }
  header .badge.pass { background: var(--pass-bg); color: var(--pass); border: 1px solid rgba(34,197,94,.25); }
  header .badge.fail { background: var(--fail-bg); color: var(--fail); border: 1px solid rgba(239,68,68,.25); }

  /* ── Grid ─────────────────────────────────────────────────────────────── */
  main { padding: 32px; }
  .notice {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px 24px; margin-bottom: 28px; font-size: 13px; color: var(--text-dim); line-height: 1.7;
  }
  .notice strong { color: var(--text); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(var(--grid-min), 1fr)); gap: 20px; }

  /* ── Card shell ───────────────────────────────────────────────────────── */
  .card {
    background: var(--surface); border-radius: var(--radius);
    border: 1.5px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
    transition: border-color .15s;
  }
  .card.pass { border-color: rgba(34,197,94,.40); }
  .card.fail { border-color: rgba(239,68,68,.40); }

  .card-label {
    padding: 10px 14px 8px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-label .name { font-size: 12px; font-weight: 600; color: var(--text); }
  .card-label .type-badge {
    font-size: 10px; text-transform: uppercase; letter-spacing: .06em; font-weight: 600;
    padding: 2px 7px; border-radius: 4px; background: var(--surface2); color: var(--text-dim);
  }

  /* ── Validation card ──────────────────────────────────────────────────── */
  .val-block {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px; padding: 28px 20px;
    position: relative;
  }
  .val-icon { font-size: 38px; }
  .val-status { font-size: 12px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; }
  .val-msg { font-size: 11px; color: var(--fail); text-align: center; padding: 0 8px; word-break: break-word; }

  /* ── Texture card ─────────────────────────────────────────────────────── */
  .img-wrap {
    position: relative; background: #0a0a0c; overflow: hidden;
    aspect-ratio: 1 / 1; cursor: crosshair;
  }
  .img-wrap img { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; display: block; }

  /* FLIP badge */
  .flip-badge {
    position: absolute; top: 8px; right: 8px;
    background: rgba(0,0,0,.65); color: var(--text); font-size: 10px; font-weight: 700;
    padding: 3px 7px; border-radius: 5px; backdrop-filter: blur(4px);
    font-family: var(--mono);
  }

  /* Magnifier canvas */
  .magnifier {
    position: absolute; bottom: 8px; right: 8px; width: 140px; height: 140px;
    border-radius: 6px; border: 1px solid rgba(255,255,255,.15); display: none;
    image-rendering: pixelated; background: #000;
  }

  /* Tab bar */
  .tabs { display: flex; border-top: 1px solid var(--border); }
  .tabs button {
    flex: 1; padding: 8px 4px; font-size: 11px; font-weight: 600; letter-spacing: .03em;
    color: var(--text-dim); background: transparent; border: none; cursor: pointer;
    border-right: 1px solid var(--border); transition: color .12s, background .12s;
  }
  .tabs button:last-child { border-right: none; }
  .tabs button.active { color: var(--tab-active); background: var(--surface2); }
  .tabs button:hover:not(.active) { color: var(--text); background: rgba(255,255,255,.03); }

  /* ── Buffer card ──────────────────────────────────────────────────────── */
  .buf-block { flex: 1; padding: 12px 14px; overflow: hidden; }
  .buf-grid {
    display: flex; flex-wrap: wrap; gap: 2px;
    max-height: 180px; overflow-y: auto;
  }
  .byte {
    width: 16px; height: 16px; border-radius: 2px; font-size: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); color: #fff; cursor: default;
    transition: transform .1s;
  }
  .byte:hover { transform: scale(1.3); z-index: 10; }
  .byte.match    { background: rgba(34,197,94,.35); }
  .byte.mismatch { background: rgba(239,68,68,.55); }
  .byte.ref-only { background: rgba(251,191,36,.45); }
  .byte.test-only{ background: rgba(139,92,246,.45); }

  .buf-legend { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
  .leg { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--text-dim); }
  .leg span { width: 10px; height: 10px; border-radius: 2px; }
  .buf-overflow { font-size: 11px; color: var(--text-dim); margin-top: 6px; }

  /* Tooltip */
  #tooltip {
    position: fixed; pointer-events: none; z-index: 999;
    background: rgba(0,0,0,.85); color: var(--text); font-size: 11px;
    font-family: var(--mono); padding: 6px 10px; border-radius: 6px;
    border: 1px solid var(--border); white-space: pre; display: none;
    backdrop-filter: blur(6px);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Modal */
  #modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000;
    display: none; align-items: center; justify-content: center; padding: 40px;
    backdrop-filter: blur(4px);
  }
  #modal-overlay.open { display: flex; }
  #modal-content {
    width: 100%; max-width: 900px; max-height: 100%;
    display: flex; flex-direction: column;
  }
  #modal-content .card { flex: 1; border: none; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
  :root.light #modal-content .card { box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
  #modal-content .buf-grid { max-height: 50vh; }
  #modal-content .val-icon { font-size: 64px; }
  #modal-content .val-status { font-size: 16px; }
  #modal-content .val-msg { font-size: 14px; }
</style>
</head>
<body>

<header>
  <h1>Luminary RHI &mdash; Test Results</h1>
  <div class="meta" id="meta"></div>
  <div class="controls">
    <input type="text" id="search" class="search-bar" placeholder="Search tests..." />
    <button class="icon-btn" id="btn-grid-minus" title="Smaller Grid">-</button>
    <button class="icon-btn" id="btn-grid-plus" title="Larger Grid">+</button>
    <button class="icon-btn" id="btn-theme" title="Toggle Theme">◐</button>
    <div class="badge" id="summary-badge"></div>
  </div>
</header>

<main>
  <div class="notice" id="notice" style="display:none">
    <strong>Note:</strong> This viewer requires a local HTTP server to load <code>results.json</code> and images
    (browsers block <code>fetch()</code> on <code>file://</code> URIs). Run one with:<br>
    <code style="color:var(--accent)">python3 -m http.server 8080</code> from the project root,
    then open <code>http://localhost:8080/tests/viewer.html</code>.
  </div>
  <div class="grid" id="grid"></div>
</main>

<div id="tooltip"></div>

<div id="modal-overlay">
  <div id="modal-content"></div>
</div>

<script>
// ── Helpers ────────────────────────────────────────────────────────────────

function el(tag, cls) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  return e;
}

function hex2(n) { return n.toString(16).padStart(2,'0').toUpperCase(); }

// results.json paths are relative to the project root.
// This viewer lives one level deep (tests/viewer.html), so prefix with "../".
function assetUrl(path) { return path ? '../' + path : path; }

// ── Build cards ────────────────────────────────────────────────────────────

function buildValidationCard(t) {
  const card = el('div', `card ${t.passed ? 'pass' : 'fail'}`);

  const label = el('div', 'card-label');
  label.innerHTML = `<span class="name">${t.name}</span><span class="type-badge">Validation</span>`;
  card.appendChild(label);

  const block = el('div', 'val-block');
  const icon  = el('div', 'val-icon');
  icon.textContent = t.passed ? '✓' : '✗';
  icon.style.color = t.passed ? 'var(--pass)' : 'var(--fail)';

  const status = el('div', 'val-status');
  status.textContent = t.passed ? 'Passed' : 'Failed';
  status.style.color = t.passed ? 'var(--pass)' : 'var(--fail)';

  block.appendChild(icon);
  block.appendChild(status);

  if (!t.passed && t.message) {
    const msg = el('div', 'val-msg');
    msg.textContent = t.message;
    block.appendChild(msg);
  }
  card.appendChild(block);
  return card;
}

// ── Texture card with magnifier ────────────────────────────────────────────

function buildTextureCard(t) {
  const card = el('div', `card ${t.passed ? 'pass' : 'fail'}`);

  const label = el('div', 'card-label');
  label.innerHTML = `<span class="name">${t.name}</span><span class="type-badge">Texture</span>`;
  card.appendChild(label);

  // Image area
  const wrap   = el('div', 'img-wrap');
  const img    = el('img');
  const magCvs = el('canvas', 'magnifier');
  magCvs.width  = 140;
  magCvs.height = 140;

  // FLIP badge
  const badge = el('div', 'flip-badge');
  if (t.flip_mean_error != null)
    badge.textContent = 'FLIP ' + t.flip_mean_error.toFixed(4);
  wrap.appendChild(img);
  wrap.appendChild(badge);
  wrap.appendChild(magCvs);
  card.appendChild(wrap);

  // Tabs
  const tabs  = el('div', 'tabs');
  const tabDefs = [
    { label: 'Output', src: assetUrl(t.output_image) },
    { label: 'Golden', src: assetUrl(t.golden_image) },
    { label: 'FLIP',   src: assetUrl(t.flip_image)   },
  ].filter(d => d.src);

  let activeSrc = tabDefs[0]?.src || '';
  img.src = activeSrc;

  // Off-screen canvas per image source, for pixel sampling
  const offscreen = {};

  function loadOffscreen(src) {
    if (!src || offscreen[src]) return;
    const c = document.createElement('canvas');
    const i = new Image();
    i.crossOrigin = 'anonymous';
    i.onload = () => {
      c.width = i.naturalWidth; c.height = i.naturalHeight;
      c.getContext('2d').drawImage(i, 0, 0);
      offscreen[src] = c;
    };
    i.onerror = () => { offscreen[src] = null; }; // CORS / missing
    i.src = src;
  }
  tabDefs.forEach(d => loadOffscreen(d.src));

  tabDefs.forEach((def, idx) => {
    const btn = el('button', idx === 0 ? 'active' : '');
    btn.textContent = def.label;
    btn.addEventListener('click', () => {
      tabs.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeSrc = def.src;
      img.src = def.src;
    });
    tabs.appendChild(btn);
  });

  // ── Magnifier ─────────────────────────────────────────────────────────
  const MAG_RADIUS  = 2;           // pixels on each side (5×5 window)
  const CELL_SIZE   = 140 / 5;     // 28px per cell

  wrap.addEventListener('mouseenter', () => { magCvs.style.display = 'block'; });
  wrap.addEventListener('mouseleave', () => { magCvs.style.display = 'none'; });

  wrap.addEventListener('mousemove', (e) => {
    const rect = wrap.getBoundingClientRect();
    const nx   = (e.clientX - rect.left) / rect.width;
    const ny   = (e.clientY - rect.top)  / rect.height;

    const canvas = offscreen[activeSrc];
    if (!canvas) return;

    const px = Math.floor(nx * canvas.width);
    const py = Math.floor(ny * canvas.height);
    const ctx = magCvs.getContext('2d');
    ctx.clearRect(0, 0, 140, 140);

    for (let dy = -MAG_RADIUS; dy <= MAG_RADIUS; dy++) {
      for (let dx = -MAG_RADIUS; dx <= MAG_RADIUS; dx++) {
        const sx = px + dx, sy = py + dy;
        const cx = (dx + MAG_RADIUS) * CELL_SIZE;
        const cy = (dy + MAG_RADIUS) * CELL_SIZE;

        if (sx < 0 || sy < 0 || sx >= canvas.width || sy >= canvas.height) {
          ctx.fillStyle = '#111';
          ctx.fillRect(cx, cy, CELL_SIZE, CELL_SIZE);
          continue;
        }

        const d = canvas.getContext('2d').getImageData(sx, sy, 1, 1).data;
        ctx.fillStyle = `rgb(${d[0]},${d[1]},${d[2]})`;
        ctx.fillRect(cx, cy, CELL_SIZE, CELL_SIZE);

        // Grid line
        ctx.strokeStyle = 'rgba(0,0,0,.35)';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(cx, cy, CELL_SIZE, CELL_SIZE);

        // Center cross-hair
        if (dx === 0 && dy === 0) {
          ctx.strokeStyle = 'rgba(255,255,255,.9)';
          ctx.lineWidth = 1;
          ctx.strokeRect(cx + 1, cy + 1, CELL_SIZE - 2, CELL_SIZE - 2);
        }

        // Hex label for 5 center cells only (avoid clutter)
        if (CELL_SIZE >= 22) {
          const brightness = (d[0] * 299 + d[1] * 587 + d[2] * 114) / 1000;
          ctx.fillStyle = brightness > 128 ? 'rgba(0,0,0,.8)' : 'rgba(255,255,255,.8)';
          ctx.font = `bold ${CELL_SIZE < 26 ? 6 : 7}px monospace`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(`${hex2(d[0])}${hex2(d[1])}${hex2(d[2])}`,
                       cx + CELL_SIZE / 2, cy + CELL_SIZE / 2);
        }
      }
    }
  });

  card.appendChild(tabs);
  return card;
}

// ── Buffer card ────────────────────────────────────────────────────────────

function buildBufferCard(t) {
  const card = el('div', `card ${t.passed ? 'pass' : 'fail'}`);

  const label = el('div', 'card-label');
  label.innerHTML = `<span class="name">${t.name}</span><span class="type-badge">Buffer</span>`;
  card.appendChild(label);

  const block = el('div', 'buf-block');

  // Load both binary files and display diff
  Promise.all([
    t.golden_buffer ? fetch(assetUrl(t.golden_buffer)).then(r => r.arrayBuffer()).catch(() => null) : Promise.resolve(null),
    t.output_buffer ? fetch(assetUrl(t.output_buffer)).then(r => r.arrayBuffer()).catch(() => null) : Promise.resolve(null),
  ]).then(([refBuf, testBuf]) => {
    const ref  = refBuf  ? new Uint8Array(refBuf)  : null;
    const test = testBuf ? new Uint8Array(testBuf) : null;

    if (!ref && !test) {
      block.innerHTML = '<span style="color:var(--text-dim);font-size:11px">No buffer files found</span>';
      return;
    }

    const LIMIT = 256;
    const len   = Math.max(ref?.length ?? 0, test?.length ?? 0);
    const grid  = el('div', 'buf-grid');

    const tooltip = document.getElementById('tooltip');

    for (let i = 0; i < Math.min(len, LIMIT); i++) {
      const rByte = ref  ? ref[i]  : undefined;
      const tByte = test ? test[i] : undefined;

      let cls = 'byte ';
      if (rByte === undefined)      cls += 'test-only';
      else if (tByte === undefined) cls += 'ref-only';
      else if (rByte === tByte)     cls += 'match';
      else                          cls += 'mismatch';

      const cell = el('div', cls);
      cell.textContent = hex2(tByte ?? rByte ?? 0);

      cell.addEventListener('mousemove', (e) => {
        tooltip.style.display = 'block';
        tooltip.style.left = (e.clientX + 14) + 'px';
        tooltip.style.top  = (e.clientY + 14) + 'px';
        const lines = [`offset  0x${hex2(i >> 8)}${hex2(i & 0xff)}`];
        if (rByte !== undefined) lines.push(`golden  0x${hex2(rByte)}`);
        if (tByte !== undefined) lines.push(`output  0x${hex2(tByte)}`);
        tooltip.textContent = lines.join('\n');
      });
      cell.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
      grid.appendChild(cell);
    }

    block.appendChild(grid);

    if (len > LIMIT) {
      const over = el('div', 'buf-overflow');
      over.textContent = `… ${len - LIMIT} more bytes`;
      block.appendChild(over);
    }

    const legend = el('div', 'buf-legend');
    legend.innerHTML = `
      <div class="leg"><span style="background:rgba(34,197,94,.35)"></span>Match</div>
      <div class="leg"><span style="background:rgba(239,68,68,.55)"></span>Mismatch</div>
      <div class="leg"><span style="background:rgba(251,191,36,.45)"></span>Ref only</div>
      <div class="leg"><span style="background:rgba(139,92,246,.45)"></span>Test only</div>
    `;
    block.appendChild(legend);
  });

  card.appendChild(block);
  return card;
}

// ── Controls & Modal ───────────────────────────────────────────────────────

document.getElementById('search').addEventListener('input', (e) => {
  const q = e.target.value.trim().toLowerCase();
  document.querySelectorAll('#grid .card').forEach(c => {
    c.style.display = c.dataset.name.includes(q) ? 'flex' : 'none';
  });
});

const gridSizes = [160, 240, 320, 480, 640];
let gridIdx = 1;
document.getElementById('btn-grid-minus').addEventListener('click', () => {
  if (gridIdx > 0) {
    gridIdx--;
    document.documentElement.style.setProperty('--grid-min', gridSizes[gridIdx] + 'px');
  }
});
document.getElementById('btn-grid-plus').addEventListener('click', () => {
  if (gridIdx < gridSizes.length - 1) {
    gridIdx++;
    document.documentElement.style.setProperty('--grid-min', gridSizes[gridIdx] + 'px');
  }
});

document.getElementById('btn-theme').addEventListener('click', () => {
  document.documentElement.classList.toggle('light');
});

document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target.id === 'modal-overlay') {
    e.target.classList.remove('open');
    document.getElementById('modal-content').innerHTML = '';
  }
});

// ── Load and render ────────────────────────────────────────────────────────

async function load() {
  let data;
  try {
    const res = await fetch('../results.json');
    if (!res.ok) throw new Error(res.statusText);
    data = await res.json();
  } catch (e) {
    document.getElementById('notice').style.display = 'block';
    document.getElementById('meta').textContent = 'Failed to load results.json — ' + e.message;
    return;
  }

  // Header
  const meta = document.getElementById('meta');
  meta.innerHTML = `
    <span>${data.device ?? 'Unknown device'}</span>
    <span>${data.backend ?? ''}</span>
    ${data.bake_mode ? '<span style="color:var(--accent)">⚙ Bake mode</span>' : ''}
  `;

  const tests     = data.tests ?? [];
  const passCount = tests.filter(t => t.passed).length;
  const badge     = document.getElementById('summary-badge');
  const allPass   = passCount === tests.length;
  badge.className = `badge ${allPass ? 'pass' : 'fail'}`;
  badge.textContent = `${passCount} / ${tests.length} passed`;

  const grid = document.getElementById('grid');
  tests.forEach(t => {
    let card;
    if      (t.type === 'validation') card = buildValidationCard(t);
    else if (t.type === 'texture')    card = buildTextureCard(t);
    else                              card = buildBufferCard(t);

    card.dataset.name = (t.name || '').toLowerCase();
    card.style.cursor = 'pointer';

    card.addEventListener('click', (e) => {
      // Ignore if clicking a button (tabs), a link, or if we are already inside the modal
      if (card.closest('#modal-content') || e.target.tagName === 'BUTTON' || e.target.closest('.tabs')) return;

      const overlay = document.getElementById('modal-overlay');
      const content = document.getElementById('modal-content');
      content.innerHTML = '';
      
      let clonedCard;
      if      (t.type === 'validation') clonedCard = buildValidationCard(t);
      else if (t.type === 'texture')    clonedCard = buildTextureCard(t);
      else                              clonedCard = buildBufferCard(t);

      content.appendChild(clonedCard);
      overlay.classList.add('open');
    });

    grid.appendChild(card);
  });
}

load();
</script>
</body>
</html>
